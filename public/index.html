<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxmox VM Provisioner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-lg border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-blue-400 flex items-center gap-2">
            🚀 Proxmox Cloud-init VM Deployer
        </h1>

        <form id="vmForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Template</label>
                    <select id="template" class="w-full bg-gray-700 border-none rounded p-2 text-white">
                        <!--YOU CAN ADD YOUR TEMPLATE IDS HERE MANUALLY IF YOU WANT -->
                        <!-- <option value="9001">Debian 12 (9001)</option> -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">VM Name</label>
                    <input type="text" id="name" placeholder="web-server-01" class="w-full bg-gray-700 border-none rounded p-2" required>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Username Admin</label>
                    <input type="text" id="user" placeholder="ubuntu" class="w-full bg-gray-700 border-none rounded p-2" required>
                </div>

            </div>

            <div id="ssh-container">
                <label class="block text-sm font-medium mb-1">SSH Public Key</label>
                <textarea id="sshkey" rows="3" class="w-full bg-gray-700 border-none rounded p-2 text-xs font-mono" placeholder="ssh-ed25519 AAA..."></textarea>
                <p class="text-[10px] text-gray-500 mt-1">Paste your public key (min. 50 characters)</p>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Cores</label>
                    <select id="cores" class="w-full bg-gray-700 border-none rounded p-2"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">RAM (MB)</label>
                    <select id="ram" class="w-full bg-gray-700 border-none rounded p-2">
                        <!-- Feel free to add more options and remember to update the default value on index.js and .env file too -->
                        <option value="1024">1024 (1GB)</option>
                        <option value="2048" selected>2048 (2GB)</option>
                        <option value="4096">4096 (4GB)</option>
                        <option value="8192">8192 (8GB)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Disk Size (GB)</label>
                    <select id="disk" class="w-full bg-gray-700 border-none rounded p-2">
                        <!-- Feel free to add more options and remember to update the default value on index.js and .env file too -->
                        <option value="10">10GB</option>
                        <option value="20" selected>20GB</option>
                        <option value="40">40GB</option>
                        <option value="60">60GB</option>
                        <option value="100">100GB</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 bg-gray-900/50 p-3 rounded border border-gray-700">
                <div>
                    <label class="block text-xs font-bold mb-1 text-green-400 uppercase">Static IP</label>
                    <input type="text" id="ip" placeholder="192.168.1.50" class="w-full bg-gray-700 border-none rounded p-2" required>
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 text-green-400 uppercase">Gateway</label>
                    <input type="text" id="gateway" placeholder="192.168.1.1" class="w-full bg-gray-700 border-none rounded p-2" required>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-500 font-bold py-3 rounded-lg transition-all active:scale-95 mt-4">
                CREATE VIRTUAL MACHINE
            </button>
        </form>

        <div class="mt-10">
            <h2 class="text-xl font-bold mb-4 text-blue-400">Created VMs</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-700 text-gray-300 uppercase text-xs">
                        <tr>
                            <th class="p-3">ID</th>
                            <th class="p-3">Name</th>
                            <th class="p-3">IP</th>
                            <th class="p-3 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="vmList" class="divide-y divide-gray-700">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="status" class="mt-4 p-3 hidden rounded text-sm text-center font-medium"></div>
    </div>

    <script>
        async function loadConfig() {
            try {
                const res = await fetch('/config');
                const config = await res.json();
                
                const templateSelect = document.getElementById('template');
                templateSelect.innerHTML = config.templates.map(t => 
                    `<option value="${t.id}">${t.name} (${t.id})</option>`
                ).join('');
                
                // Puoi anche usare config.maxCores ecc. per limitare dinamicamente i select della UI
            } catch (e) {
                console.error("Error loading config", e);
            }
        }

        // Chiama loadConfig all'avvio
        loadConfig();

        // Popola i Core (1-10)
        const coreSelect = document.getElementById('cores');
        for(let i=1; i<=10; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = i + (i === 1 ? ' Core' : ' Cores');
            if(i === 2) opt.selected = true;
            coreSelect.appendChild(opt);
        }

        const form = document.getElementById('vmForm');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('btnSubmit');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // 1. Validazione manuale solo per la chiave SSH
            const sshKeyField = document.getElementById('sshkey');
            if (!sshKeyField.value || sshKeyField.value.length < 50) {
                alert("Please enter a valid SSH key (at least 50 characters)!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "⏳ Creating VM...";
            statusDiv.classList.remove('hidden', 'bg-red-900', 'bg-green-900');
            statusDiv.classList.add('bg-blue-900', 'block');
            statusDiv.innerText = "Operation started. Wait around 30-40 seconds...";

            const payload = {
                template: document.getElementById('template').value,
                name: document.getElementById('name').value,
                user: document.getElementById('user').value,
                authType: "ssh",
                sshkey: sshKeyField.value,
                cores: parseInt(document.getElementById('cores').value),
                ram: parseInt(document.getElementById('ram').value),
                disk: parseInt(document.getElementById('disk').value),
                ip: document.getElementById('ip').value,
                gateway: document.getElementById('gateway').value
            };

            try {
                const res = await fetch('/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await res.json();

                if (res.ok) {
                    statusDiv.className = "mt-4 p-3 rounded text-sm text-center bg-green-600 block";
                    statusDiv.innerText = `✅ VM ${result.vmid} created successfully with IP ${result.ip}!`;
                    loadVMs(); // Ricarica la lista delle VM
                } else {
                    throw new Error(result.error || "Unknown error");
                }
            } catch (err) {
                statusDiv.className = "mt-4 p-3 rounded text-sm text-center bg-red-600 text-white block";
                statusDiv.innerText = "❌ Error: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "CREATE VM";
            }
        };

        async function loadVMs() {
        try {
            const res = await fetch('/list');
            const vms = await res.json();
            const container = document.getElementById('vmList');
            container.innerHTML = vms.map(vm => `
                <tr class="hover:bg-gray-700/50 transition-colors">
                    <td class="p-3 font-mono">${vm.vmid}</td>
                    <td class="p-3">${vm.name}</td>
                    <td class="p-3 text-green-400 font-mono">${vm.ip}</td>
                    <td class="p-3 text-right">
                        <button onclick="deleteVM(${vm.vmid})" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white px-3 py-1 rounded border border-red-600/50 transition-all text-xs">
                            Elimina
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch (e) { console.error("Error loading VM list", e); }
    }

    async function deleteVM(vmid) {
        if (!confirm(`Are you sure you want to delete and destroy the VM ${vmid}?`)) return;
        
        try {
            const res = await fetch(`/delete/${vmid}`, { method: 'DELETE' });
            if (res.ok) {
                await loadVMs(); // Ricarica la lista
                alert("VM deleted successfully and logs updated!");
            } else {
                const err = await res.json();
                alert("Error: " + JSON.stringify(err.error));
            }
        } catch (e) { alert("Network error"); }
    }

    // Carica la lista all'avvio
    loadVMs();
    </script>
</body>
</html>
